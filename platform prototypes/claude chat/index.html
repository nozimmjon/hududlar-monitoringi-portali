<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CERR — Ҳудудларни мониторинг қилиш платформаси</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500;600&display=swap">
<style>
:root {
  --bg:           #F7F5F0;
  --bg-soft:      #EFEDE6;
  --surface:      #FFFFFF;
  --surface-soft: #FAF8F3;
  --border:       #E0DDD3;
  --border-soft:  #ECE9E0;
  --ink:          #1A1A1A;
  --ink-2:        #3F3F3F;
  --muted:        #6B6B66;
  --faint:        #9C9A92;

  --teal:         #1B4D5A;
  --teal-soft:    #D9E5E8;
  --teal-deep:    #0F3540;

  --green:        #15803D;
  --green-soft:   #DCFCE7;
  --amber:        #B45309;
  --amber-soft:   #FEF3C7;
  --red:          #B91C1C;
  --red-soft:     #FEE2E2;
  --gray:         #71717A;
  --gray-soft:    #E4E4E7;

  --shadow-1: 0 1px 2px rgba(15,15,15,0.04), 0 1px 0 rgba(15,15,15,0.02);
  --shadow-2: 0 2px 8px rgba(15,15,15,0.06), 0 1px 0 rgba(15,15,15,0.02);
  --shadow-3: 0 8px 32px rgba(15,15,15,0.10), 0 2px 4px rgba(15,15,15,0.04);
}

*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; margin: 0; padding: 0; }
body {
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; font-size: inherit; }

/* ─────────── App shell ─────────── */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}

/* ─────────── Sidebar ─────────── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 0 32px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.sidebar-brand {
  padding: 0 24px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.sidebar-brand-row {
  display: flex; align-items: center; gap: 12px;
}
.sidebar-logo {
  width: 36px; height: 36px;
  background: var(--teal);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-family: 'IBM Plex Serif', serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.04em;
}
.sidebar-brand-text {
  line-height: 1.25;
}
.sidebar-brand-text-1 {
  font-weight: 600;
  font-size: 13px;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.sidebar-brand-text-2 {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}
.sidebar-section {
  padding: 14px 24px 6px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.10em;
  color: var(--faint);
  text-transform: uppercase;
}
.sidebar-link {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 24px;
  font-size: 13.5px;
  color: var(--ink-2);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background .12s, border-color .12s, color .12s;
  user-select: none;
}
.sidebar-link:hover { background: var(--surface-soft); }
.sidebar-link.active {
  background: var(--surface-soft);
  border-left-color: var(--teal);
  color: var(--teal-deep);
  font-weight: 600;
}
.sidebar-link-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gray); flex-shrink: 0;
}
.sidebar-link-dot.green  { background: var(--green); }
.sidebar-link-dot.amber  { background: var(--amber); }
.sidebar-link-dot.red    { background: var(--red); }
.sidebar-link-dot.gray   { background: var(--gray-soft); border: 1.5px solid var(--gray); }
.sidebar-link-name { flex: 1; }
.sidebar-link-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  color: var(--muted);
  font-weight: 500;
}
.sidebar-link.active .sidebar-link-meta { color: var(--teal); }

.sidebar-quarter {
  margin-top: auto;
  padding: 16px 24px 0;
  border-top: 1px solid var(--border);
}
.sidebar-quarter-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.10em;
  color: var(--faint);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.quarter-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 4px;
}
.quarter-btn {
  border: 1px solid var(--border);
  background: var(--surface);
  padding: 6px 0;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 0.04em;
  color: var(--ink-2);
  text-align: center;
}
.quarter-btn:hover { background: var(--bg-soft); }
.quarter-btn.active {
  background: var(--teal);
  color: #fff;
  border-color: var(--teal);
}

/* ─────────── Main content ─────────── */
.main {
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg);
}

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 18px 32px 0;
  position: sticky;
  top: 0;
  z-index: 30;
}
.topbar-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 24px;
  margin-bottom: 16px;
}
.topbar-title {
  font-family: 'IBM Plex Serif', serif;
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--ink);
  line-height: 1.15;
  margin: 0;
}
.topbar-sub {
  font-size: 12.5px;
  color: var(--muted);
  margin-top: 4px;
  font-family: 'IBM Plex Mono', monospace;
}
.topbar-actions {
  display: flex; gap: 8px; align-items: center;
}
.btn {
  padding: 7px 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 6px;
  font-size: 12.5px;
  color: var(--ink);
  font-weight: 500;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { background: var(--bg-soft); }
.btn-primary {
  background: var(--teal); color: #fff; border-color: var(--teal);
}
.btn-primary:hover { background: var(--teal-deep); }
.btn-icon {
  width: 30px; height: 30px;
  padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--border);
  margin: 0 -32px;
  padding: 0 32px;
}
.tab {
  padding: 10px 16px;
  border: none;
  background: transparent;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  display: inline-flex; align-items: center; gap: 8px;
}
.tab:hover { color: var(--ink); }
.tab.active {
  color: var(--teal-deep);
  border-bottom-color: var(--teal);
  font-weight: 600;
}
.tab-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  background: var(--bg-soft);
  color: var(--muted);
  padding: 2px 6px;
  border-radius: 10px;
  font-weight: 500;
}
.tab.active .tab-count { background: var(--teal-soft); color: var(--teal-deep); }

.content {
  padding: 28px 32px 64px;
  flex: 1;
  min-width: 0;
}

/* ─────────── Cards & panels ─────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.card-head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-soft);
  display: flex; justify-content: space-between; align-items: center;
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  margin: 0;
  letter-spacing: -0.005em;
}
.card-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}
.card-body { padding: 18px; }
.card-body.tight { padding: 0; }

/* KPI tiles grid */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.kpi-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gray);
  border-radius: 6px;
  padding: 14px 16px;
  position: relative;
}
.kpi-tile.green { border-left-color: var(--green); }
.kpi-tile.amber { border-left-color: var(--amber); }
.kpi-tile.red   { border-left-color: var(--red); }
.kpi-tile.gray  { border-left-color: var(--gray); }
.kpi-tile-label {
  font-size: 11.5px;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 4px;
  letter-spacing: -0.005em;
  display: flex; justify-content: space-between; align-items: center;
}
.kpi-tile-num {
  font-family: 'IBM Plex Sans', sans-serif;
  font-feature-settings: "tnum";
  font-size: 28px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.1;
  letter-spacing: -0.025em;
  margin: 2px 0;
  display: flex; align-items: baseline; gap: 4px;
}
.kpi-tile-num small {
  font-size: 14px;
  color: var(--muted);
  font-weight: 400;
}
.kpi-tile-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  display: flex; justify-content: space-between; align-items: center;
}
.kpi-tile-meta b {
  color: var(--ink);
  font-weight: 600;
}

/* Status pills */
.status {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 2px 8px;
  border-radius: 100px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border: 1px solid transparent;
}
.status::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.status.green { background: var(--green-soft); color: var(--green); }
.status.amber { background: var(--amber-soft); color: var(--amber); }
.status.red   { background: var(--red-soft);   color: var(--red); }
.status.gray  { background: var(--gray-soft);  color: var(--gray); }

/* Tables */
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.tbl thead th {
  text-align: left;
  padding: 10px 14px;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--surface-soft);
  border-bottom: 1px solid var(--border);
  font-family: 'IBM Plex Mono', monospace;
}
.tbl thead th.r { text-align: right; }
.tbl thead th.c { text-align: center; }
.tbl tbody td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border-soft);
  vertical-align: middle;
}
.tbl tbody td.r { text-align: right; font-family: 'IBM Plex Mono', monospace; font-feature-settings: "tnum"; }
.tbl tbody td.c { text-align: center; }
.tbl tbody tr { background: var(--surface); transition: background .1s; }
.tbl tbody tr:hover { background: var(--surface-soft); }
.tbl tbody tr.clickable { cursor: pointer; }
.tbl-bold { font-weight: 600; color: var(--ink); }
.tbl-muted { color: var(--muted); font-size: 12px; }
.tbl-num {
  font-family: 'IBM Plex Mono', monospace;
  font-feature-settings: "tnum";
  font-weight: 500;
}

/* Section header within content */
.section-head {
  display: flex; justify-content: space-between; align-items: end;
  margin: 28px 0 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-soft);
}
.section-head h2 {
  font-family: 'IBM Plex Serif', serif;
  font-size: 18px;
  font-weight: 500;
  margin: 0;
  letter-spacing: -0.015em;
  color: var(--ink);
}
.section-head-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

/* District grid */
.dgrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
}
.dcell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 14px;
  cursor: pointer;
  transition: border-color .12s, box-shadow .12s;
  position: relative;
}
.dcell:hover { border-color: var(--teal); box-shadow: var(--shadow-2); }
.dcell-name {
  font-weight: 600; font-size: 13px;
  color: var(--ink);
  margin-bottom: 4px;
  display: flex; justify-content: space-between; align-items: baseline;
}
.dcell-name small {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 400;
  font-size: 10px;
  color: var(--faint);
  letter-spacing: 0.06em;
}
.dcell-num {
  font-family: 'IBM Plex Sans', sans-serif;
  font-feature-settings: "tnum";
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1;
}
.dcell-num.green { color: var(--green); }
.dcell-num.amber { color: var(--amber); }
.dcell-num.red   { color: var(--red); }
.dcell-num.gray  { color: var(--gray); }
.dcell-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
  display: flex; justify-content: space-between;
}
.dcell-strip {
  margin-top: 8px;
  height: 3px;
  background: var(--bg-soft);
  border-radius: 2px;
  overflow: hidden;
}
.dcell-strip > div {
  height: 100%;
  background: var(--gray);
  transition: width .6s ease;
}
.dcell-strip > div.green { background: var(--green); }
.dcell-strip > div.amber { background: var(--amber); }
.dcell-strip > div.red   { background: var(--red); }

/* Filters bar */
.filters {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  display: flex; gap: 10px; align-items: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.filter-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  margin-right: 4px;
}
.select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--surface);
  font-size: 12.5px;
  color: var(--ink);
  outline: none;
}
.select:focus { border-color: var(--teal); }
.search {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--surface);
  font-size: 12.5px;
  color: var(--ink);
  outline: none;
  min-width: 220px;
}
.search:focus { border-color: var(--teal); }

/* Task list */
.task-list { display: flex; flex-direction: column; gap: 6px; }
.task {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 14px 12px 16px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: start;
  cursor: pointer;
  transition: border-color .1s, box-shadow .1s;
  border-left: 3px solid var(--gray);
}
.task:hover { border-color: var(--border); box-shadow: var(--shadow-2); }
.task.green { border-left-color: var(--green); }
.task.amber { border-left-color: var(--amber); }
.task.red   { border-left-color: var(--red); }
.task.gray  { border-left-color: var(--gray); }
.task-title {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--ink);
  margin: 0 0 4px;
  letter-spacing: -0.005em;
}
.task-desc {
  font-size: 12.5px;
  color: var(--ink-2);
  line-height: 1.45;
  margin-bottom: 6px;
}
.task-meta {
  display: flex; flex-wrap: wrap; gap: 12px;
  font-size: 11px;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
}
.task-meta-pair { display: flex; gap: 4px; }
.task-meta-pair b { color: var(--ink-2); font-weight: 600; }
.task-progress {
  text-align: right;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}
.task-progress-num {
  font-family: 'IBM Plex Sans', sans-serif;
  font-feature-settings: "tnum";
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
}
.task-progress-num.green { color: var(--green); }
.task-progress-num.amber { color: var(--amber); }
.task-progress-num.red   { color: var(--red); }

/* Modal */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(20,20,20,0.4);
  backdrop-filter: blur(2px);
  z-index: 100;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 16px;
  overflow-y: auto;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 100%;
  max-width: 720px;
  box-shadow: var(--shadow-3);
  animation: mod 0.16s ease-out;
}
@keyframes mod { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.modal-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-soft);
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 16px;
}
.modal-title {
  font-family: 'IBM Plex Serif', serif;
  font-size: 17px;
  font-weight: 500;
  color: var(--ink);
  margin: 0;
  letter-spacing: -0.015em;
}
.modal-sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}
.modal-close {
  width: 30px; height: 30px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 14px;
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.modal-close:hover { background: var(--bg-soft); color: var(--ink); }
.modal-body { padding: 20px; }
.modal-foot {
  padding: 14px 20px;
  border-top: 1px solid var(--border-soft);
  display: flex; justify-content: flex-end; gap: 8px;
  background: var(--surface-soft);
}

/* Form fields */
.field { margin-bottom: 14px; }
.field-label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 5px;
  letter-spacing: -0.005em;
}
.field-input, .field-select, .field-textarea {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--surface);
  font-size: 13px;
  color: var(--ink);
  outline: none;
  font-family: inherit;
}
.field-input:focus, .field-select:focus, .field-textarea:focus { border-color: var(--teal); }
.field-textarea { min-height: 80px; resize: vertical; line-height: 1.45; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-help {
  font-size: 11px; color: var(--muted); margin-top: 4px;
}

/* Status group */
.status-pick { display: flex; gap: 6px; }
.status-pick-btn {
  flex: 1;
  padding: 7px 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 5px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
}
.status-pick-btn:hover { background: var(--bg-soft); }
.status-pick-btn.active.green { background: var(--green-soft); color: var(--green); border-color: var(--green); }
.status-pick-btn.active.amber { background: var(--amber-soft); color: var(--amber); border-color: var(--amber); }
.status-pick-btn.active.red   { background: var(--red-soft);   color: var(--red);   border-color: var(--red); }
.status-pick-btn.active.gray  { background: var(--gray-soft);  color: var(--gray);  border-color: var(--gray); }

/* Evidence log */
.evidence-list { display: flex; flex-direction: column; gap: 8px; }
.evidence {
  background: var(--surface-soft);
  border: 1px solid var(--border-soft);
  border-radius: 6px;
  padding: 10px 12px;
  position: relative;
}
.evidence-head {
  display: flex; justify-content: space-between;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 4px;
}
.evidence-author { font-weight: 600; color: var(--ink-2); }
.evidence-text {
  font-size: 13px;
  color: var(--ink);
  line-height: 1.5;
  white-space: pre-wrap;
}
.evidence-empty {
  text-align: center;
  padding: 16px;
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
  border: 1px dashed var(--border);
  border-radius: 6px;
}

/* Quality badges */
.qbadge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 8px 3px 6px;
  border-radius: 4px;
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  background: var(--bg-soft);
  color: var(--ink-2);
  border: 1px solid var(--border);
}
.qbadge.warn { background: var(--amber-soft); color: var(--amber); border-color: rgba(180,83,9,0.2); }
.qbadge.bad  { background: var(--red-soft);   color: var(--red);   border-color: rgba(185,28,28,0.2); }

/* Empty/info states */
.empty {
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: 8px;
  padding: 32px 24px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
}
.empty b { color: var(--ink); }

/* Two-column layout */
.two-col { display: grid; grid-template-columns: 7fr 5fr; gap: 20px; }
@media (max-width: 1100px) { .two-col { grid-template-columns: 1fr; } }

/* Inline indicator chip with progress */
.ind-chip {
  display: grid;
  grid-template-columns: 8px 1fr 90px 100px;
  gap: 12px;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px dashed var(--border-soft);
}
.ind-chip:last-child { border-bottom: none; }
.ind-chip-bar {
  height: 8px; background: var(--bg-soft); border-radius: 4px; overflow: hidden;
  position: relative;
}
.ind-chip-bar-fill { height: 100%; transition: width .8s ease; }
.ind-chip-bar-fill.green { background: var(--green); }
.ind-chip-bar-fill.amber { background: var(--amber); }
.ind-chip-bar-fill.red   { background: var(--red); }
.ind-chip-bar-fill.gray  { background: var(--gray); }
.ind-chip-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  display: flex; align-items: center; gap: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ind-chip-pct {
  font-family: 'IBM Plex Mono', monospace;
  font-feature-settings: "tnum";
  font-size: 12px;
  font-weight: 600;
  text-align: right;
  color: var(--ink);
}
.ind-chip-pct.green { color: var(--green); }
.ind-chip-pct.amber { color: var(--amber); }
.ind-chip-pct.red   { color: var(--red); }
.ind-chip-pct.gray  { color: var(--gray); }
.ind-chip-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--gray);
}
.ind-chip-dot.green { background: var(--green); }
.ind-chip-dot.amber { background: var(--amber); }
.ind-chip-dot.red   { background: var(--red); }
.ind-chip-dot.gray  { background: var(--gray-soft); border: 1.5px solid var(--gray); width: 5px; height: 5px; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--ink); color: #fff;
  padding: 10px 16px; border-radius: 6px;
  font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-3);
  z-index: 200;
  opacity: 0; pointer-events: none;
  transform: translateY(8px);
  transition: opacity .2s, transform .2s;
}
.toast.show { opacity: 1; transform: none; }

/* Responsive */
@media (max-width: 980px) {
  .app { grid-template-columns: 1fr; }
  .sidebar {
    height: auto; position: relative;
    border-right: none; border-bottom: 1px solid var(--border);
  }
  .topbar, .content { padding-left: 16px; padding-right: 16px; }
  .tabs { margin: 0 -16px; padding: 0 16px; overflow-x: auto; }
  .two-col { grid-template-columns: 1fr; }
}

// PERSISTENT STORAGE (localStorage with graceful fallback)
// ════════════════════════════════════════════════════════════════
const Store = (() => {
  let inMem = {};
  const KEY = 'cerr_monitor_v1';
  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) inMem = JSON.parse(raw);
    } catch(e) { /* localStorage unavailable */ }
  }
  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(inMem)); } catch(e) {}
  }
  load();
  return {
    getEvidence(taskId) { return (inMem.evidence && inMem.evidence[taskId]) || []; },
    addEvidence(taskId, entry) {
      inMem.evidence = inMem.evidence || {};
      inMem.evidence[taskId] = inMem.evidence[taskId] || [];
      inMem.evidence[taskId].push(entry);
      save();
    },
    deleteEvidence(taskId, idx) {
      if (!inMem.evidence || !inMem.evidence[taskId]) return;
      inMem.evidence[taskId].splice(idx, 1);
      save();
    },
    getStatusOverride(taskId) { return inMem.statusOverrides && inMem.statusOverrides[taskId]; },
    setStatusOverride(taskId, status) {
      inMem.statusOverrides = inMem.statusOverrides || {};
      if (status) inMem.statusOverrides[taskId] = status;
      else delete inMem.statusOverrides[taskId];
      save();
    },
    getActualOverride(taskId) { return inMem.actualOverrides && inMem.actualOverrides[taskId]; },
    setActualOverride(taskId, period, value) {
      inMem.actualOverrides = inMem.actualOverrides || {};
      inMem.actualOverrides[taskId] = inMem.actualOverrides[taskId] || {};
      if (value === '' || value == null) delete inMem.actualOverrides[taskId][period];
      else inMem.actualOverrides[taskId][period] = parseFloat(value);
      save();
    },
    getAll() { return inMem; },
    isPersistent() {
      try { localStorage.setItem('_t','_t'); localStorage.removeItem('_t'); return true; }
      catch(e) { return false; }
    },
  };
})();

// STATUS LOGIC
// ════════════════════════════════════════════════════════════════

// Calculate status based on actual/target with direction
// direction='up': higher is better → ratio = actual/target
// direction='down': lower is better → ratio = target/actual
// thresholds: green ≥95%, amber 80-95%, red <80%, gray no data
function calcStatus(actual, target, direction) {
  if (actual == null || actual === '' || target == null || target === 0) return 'gray';
  const a = parseFloat(actual), t = parseFloat(target);
  if (isNaN(a) || isNaN(t)) return 'gray';
  let ratio;
  if (direction === 'down') ratio = t / a;
  else ratio = a / t;
  if (ratio >= 0.95) return 'green';
  if (ratio >= 0.80) return 'amber';
  return 'red';
}

function pctOfTarget(actual, target, direction) {
  if (actual == null || target == null || target === 0) return null;
  if (direction === 'down') return (target / actual) * 100;
  return (actual / target) * 100;
}

// Get effective task data with overrides
function getTaskState(task, period) {
  const actualKey = period === 'q1' ? 'actualQ1' : 'actualH1';
  let actual = task[actualKey];
  const override = Store.getActualOverride(task.id);
  if (override && override[period] !== undefined) actual = override[period];
  const target = period === 'q1' ? null : task.targetH1;
  // For Q1: compare to scaled target (~25% of year)
  let effectiveTarget = target;
  if (period === 'q1' && task.targetH1) effectiveTarget = task.targetH1 * 0.5; // Q1 ~ half of H1
  if (period === 'year') effectiveTarget = task.targetYear;
  if (period === '9m') effectiveTarget = task.targetYear * 0.75;
  
  // Sector → direction (simplified)
  const upSectors = ['industry','investment','export','employment','budget'];
  const direction = upSectors.includes(task.sector) ? 'up' : 'up';
  
  let status = Store.getStatusOverride(task.id);
  if (!status) status = calcStatus(actual, effectiveTarget, direction);
  
  return { actual, effectiveTarget, status, direction, pct: pctOfTarget(actual, effectiveTarget, direction) };
}

// Region health: aggregate status across indicators for given period
function regionHealth(regionId, period) {
  const k = REGION_KPI[regionId];
  if (!k) return { score: 0, byStatus: {green:0, amber:0, red:0, gray:0} };
  const counts = {green:0, amber:0, red:0, gray:0};
  INDICATORS.forEach(ind => {
    const ix = k[ind.id]; if (!ix) return;
    const periodData = ix[period] || {};
    const status = calcStatus(periodData.actual, periodData.target, ind.direction);
    counts[status] = (counts[status] || 0) + 1;
  });
  // Worst-status wins for headline
  let overall = 'gray';
  if (counts.red > 0) overall = 'red';
  else if (counts.amber > 0) overall = 'amber';
  else if (counts.green > 0) overall = 'green';
  return { byStatus: counts, overall };
}

const $ = (sel) => document.querySelector(sel);
const fmt = (n, d=1) => {
  if (n == null) return '—';
  if (Math.abs(n) >= 1000) return n.toLocaleString('uz-Cyrl-UZ', {maximumFractionDigits: 0}).replace(/,/g, ' ');
  return Number(n).toLocaleString('uz-Cyrl-UZ', {maximumFractionDigits: d}).replace(/,/g, ',').replace(/\./g, ',');
};
const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const QUARTER_LABEL = { q1: 'I чорак', h1: 'I ярим йиллик', '9m': '9 ой', year: 'Йил якуни' };

// Count data quality flags across the data
function countQualityFlags() {
  let n = 0;
  REGIONS.forEach(r => {
    const k = REGION_KPI[r.id];
    if (!k) { n++; return; }
    INDICATORS.forEach(ind => {
      const periods = ['q1','h1','9m','year'];
      periods.forEach(p => {
        const v = k[ind.id] && k[ind.id][p];
        if (!v) n++;
        else if (v.target == null) n++;
      });
    });
  });
  return n;
}

                  <td class="r">${q1.target!=null?sign+fmt(q1.target):'—'}</td>
                  <td class="r tbl-bold">${q1.actual!=null?sign+fmt(q1.actual):'—'}</td>
                  <td class="c"><span class="status ${q1s}"></span></td>
                  <td class="r">${h1.target!=null?sign+fmt(h1.target):'—'}</td>
                  <td class="r tbl-bold">${h1.actual!=null?sign+fmt(h1.actual):'—'}</td>
                  <td class="c"><span class="status ${h1s}"></span></td>
                  <td class="r">${yr.target!=null?sign+fmt(yr.target):'—'}</td>
                  <td class="c">${renderSparkline([q1.actual, h1.actual, null, null], ind.direction)}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderSparkline(values, direction) {
  // Tiny inline svg sparkline
  const w = 60, h = 18;
  const valid = values.map(v => v != null ? +v : null);
  const known = valid.filter(v => v != null);
  if (known.length === 0) return '<span class="tbl-muted">—</span>';
  const min = Math.min(...known), max = Math.max(...known);
  const range = (max - min) || 1;
  const xs = valid.map((v, i) => ({
    x: (i / (values.length - 1)) * w,
    y: v == null ? null : h - 2 - ((v - min) / range) * (h - 4)
  }));
  let pathData = '';
  let started = false;
  xs.forEach((p) => {
    if (p.y == null) { started = false; return; }
    pathData += (started ? ' L ' : ' M ') + p.x.toFixed(1) + ' ' + p.y.toFixed(1);
    started = true;
  });
  const dots = xs.filter(p => p.y != null).map(p =>
    `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="1.6" fill="#1B4D5A"/>`
  ).join('');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="vertical-align:middle">
    <path d="${pathData}" fill="none" stroke="#1B4D5A" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
  </svg>`;
}

                  <div class="evidence-head">
                    <span><span class="evidence-author">${escapeHtml(e.author||'Аноним')}</span> • ${escapeHtml(e.date)}</span>
                    <button class="modal-close" style="width:22px;height:22px;font-size:12px" onclick="deleteEvidence('${task.id}',${realIdx})">×</button>
                  </div>
                  <div class="evidence-text">${escapeHtml(e.text)}</div>
                </div>`;
              }).join('')
        }</div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Ёпиш</button>
    </div>
  `;
  $('#modal-bg').classList.add('open');
}

function closeModal() {
  $('#modal-bg').classList.remove('open');
}

function toggleAddEvidence() {
  const f = $('#add-evidence-form');
  const open = f.style.display === 'none' || !f.style.display;
  f.style.display = open ? 'block' : 'none';
  if (open) $('#ev-author').focus();
}

function saveEvidence(taskId) {
  const author = $('#ev-author').value.trim();
  const date = $('#ev-date').value;
  const text = $('#ev-text').value.trim();
  if (!text) { showToast('Изоҳ бўш бўлмаслиги керак'); return; }
  Store.addEvidence(taskId, { author, date, text });
  showToast('Сақланди');
  openTaskModal(taskId);
  rerenderContent();
}

function deleteEvidence(taskId, idx) {
  if (!confirm('Ушбу изоҳни ўчирасизми?')) return;
  Store.deleteEvidence(taskId, idx);
  openTaskModal(taskId);
  rerenderContent();
}

function setTaskStatus(taskId, status) {
  Store.setStatusOverride(taskId, status);
  showToast('Ҳолат янгиланди');
  openTaskModal(taskId);
  rerenderContent();
}

function updateTaskActual(taskId, period, value) {
  Store.setActualOverride(taskId, period, value);
  showToast('Сақланди');
  rerenderContent();
}

function openDistrictModal(regionId, districtName) {
  const r = REGIONS.find(x => x.id === regionId);
  const distData = DISTRICT_KPI[regionId] && DISTRICT_KPI[regionId][districtName];
  const regionData = REGION_KPI[regionId];

  $('#modal').innerHTML = `
    <div class="modal-head">
      <div>
        <div class="modal-title">${escapeHtml(districtName)}</div>
        <div class="modal-sub">${escapeHtml(r.name)} • туман/шаҳар даражасидаги ҳолат</div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      ${distData ? `
        <table class="tbl">
          <thead><tr><th>Кўрсаткич</th><th class="r">Туман</th><th class="r">Ҳудуд мақсад</th><th class="c">Ҳолат</th></tr></thead>
          <tbody>
            ${INDICATORS.map(ind => {
              const v = distData[ind.id];
              const target = regionData && regionData[ind.id] && regionData[ind.id][App.quarter] && regionData[ind.id][App.quarter].target;
              const status = calcStatus(v, target, ind.direction);
              const sign = ind.direction === 'up' && ind.unit === '%' ? '+' : '';
              return `<tr>
                <td class="tbl-bold">${escapeHtml(ind.name)}</td>
                <td class="r tbl-num">${v!=null?sign+fmt(v)+ind.unit:'—'}</td>
                <td class="r">${target!=null?sign+fmt(target)+ind.unit:'—'}</td>
                <td class="c"><span class="status ${status}"></span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      ` : `
        <div class="empty">
          <b>Бу туман учун маълумот ҳозирча йўқ.</b><br>
          Ҳудуд жадвалларининг тўлиқ юкланиши кутилмоқда.
        </div>
      `}

      <div style="margin-top:18px">
        <h3 style="font-family:'IBM Plex Serif',serif;font-size:14px;font-weight:600;margin:0 0 10px">Туманга оид вазифалар</h3>
        ${(() => {
          const dt = ALL_TASKS.filter(t => t.region===regionId && t.district===districtName);
          if (dt.length === 0) return '<div class="evidence-empty">Туманга оид махсус вазифа белгиланмаган</div>';
          return `<div class="task-list">${dt.map(t => renderTaskRow(t)).join('')}</div>`;
        })()}
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Ёпиш</button>
    </div>
  `;
  $('#modal-bg').classList.add('open');
}

// ─── Toast ───
let toastTimer = null;
function showToast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ─── Main render dispatch ───
function rerenderContent() {
  const body = renderContentBody();
  $('#content').innerHTML = body;
  // Re-render sidebar dot health (in case statuses changed)
  renderSidebar();
}
function render() {
  renderTopbar();
  renderSidebar();
  rerenderContent();
}

function renderContentBody() {
  if (App.view === 'overview') return renderOverview();
  if (App.view === 'tasks-all') return renderAllTasks();
  if (App.view === 'quality') return renderQualityView();
  if (App.view.startsWith('region:')) {
    const r = REGIONS.find(x => x.id === App.view.slice(7));
    if (!r) return '<div class="empty">Ҳудуд топилмади</div>';
    if (App.regionTab === 'overview') return renderRegionOverview(r);
    if (App.regionTab === 'kpis')      return renderRegionKpis(r);
    if (App.regionTab === 'tasks')     return renderRegionTasks(r);
    if (App.regionTab === 'districts') return renderRegionDistricts(r);
    if (App.regionTab === 'evidence')  return renderRegionEvidence(r);
  }
  return '<div class="empty">Сафа топилмади</div>';
}

// ─── INIT ───
document.addEventListener('DOMContentLoaded', () => {
  // Default district indicator
  App.districtIndicator = 'industry';
  // Default to region: andijan since it's the most populated
  navigate('region:andijan');
});
</script>

</body>
</html>
