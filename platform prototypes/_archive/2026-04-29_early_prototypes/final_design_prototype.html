<!DOCTYPE html>
<html lang="uz-Cyrl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ҳудудлар мониторинги — якуний дизайн прототипи</title>
  <style>
    :root {
      color-scheme: light;
      --ink: oklch(24% 0.032 248);
      --muted: oklch(48% 0.026 248);
      --soft: oklch(65% 0.018 248);
      --line: oklch(88% 0.014 248);
      --line-strong: oklch(80% 0.018 248);
      --page: oklch(97% 0.008 248);
      --panel: oklch(99% 0.005 248);
      --panel-2: oklch(94% 0.012 248);
      --blue: oklch(45% 0.128 254);
      --blue-soft: oklch(93% 0.032 254);
      --green: oklch(48% 0.13 154);
      --green-soft: oklch(92% 0.05 154);
      --yellow: oklch(68% 0.14 78);
      --yellow-soft: oklch(94% 0.055 78);
      --red: oklch(54% 0.18 27);
      --red-soft: oklch(94% 0.047 27);
      --gray-chip: oklch(90% 0.011 248);
      --shadow: 0 18px 55px oklch(22% 0.04 248 / 0.10);
      --nav: 248px;
      --drawer: 420px;
      --r: 8px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --font: "Aptos", "Segoe UI", Tahoma, sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background:
        linear-gradient(90deg, oklch(92% 0.016 248) 1px, transparent 1px) 0 0 / 34px 34px,
        linear-gradient(0deg, oklch(92% 0.016 248) 1px, transparent 1px) 0 0 / 34px 34px,
        var(--page);
      color: var(--ink);
    }

    button, input, select, textarea { font: inherit; }
    button { color: inherit; }
    button, select, input, textarea { transition: border-color .16s ease, background .16s ease, color .16s ease, box-shadow .16s ease, transform .16s ease; }
    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 3px solid color-mix(in oklch, var(--blue) 28%, transparent);
      outline-offset: 2px;
    }

    .app {
      display: grid;
      grid-template-columns: var(--nav) minmax(0, 1fr);
      min-height: 100vh;
    }

    .nav {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 18px 14px;
      background: oklch(20% 0.04 252);
      color: oklch(94% 0.018 248);
      border-right: 1px solid oklch(30% 0.04 252);
    }

    .brand {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 10px;
      align-items: center;
      padding: 8px;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid oklch(74% 0.08 254 / 0.55);
      background: oklch(28% 0.058 252);
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand strong {
      display: block;
      font-size: 15px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .brand span {
      display: block;
      margin-top: 3px;
      color: oklch(76% 0.028 248);
      font-size: 12px;
    }

    .nav-group {
      display: grid;
      gap: 4px;
    }

    .nav-btn {
      width: 100%;
      border: 0;
      display: grid;
      grid-template-columns: 26px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 9px;
      border-radius: 7px;
      background: transparent;
      color: oklch(82% 0.02 248);
      text-align: left;
      cursor: pointer;
    }

    .nav-btn:hover { background: oklch(26% 0.047 252); color: oklch(98% 0.01 248); }
    .nav-btn.active {
      background: oklch(96% 0.012 248);
      color: oklch(22% 0.04 252);
    }
    .nav-btn .ico {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border: 1px solid currentColor;
      border-radius: 50%;
      font-size: 12px;
      opacity: .75;
    }
    .nav-btn b { font-size: 13px; font-weight: 700; }
    .nav-btn small {
      justify-self: end;
      color: inherit;
      opacity: .62;
      font-size: 12px;
    }

    .nav-foot {
      margin-top: auto;
      padding: 12px;
      border: 1px solid oklch(35% 0.045 252);
      border-radius: 8px;
      background: oklch(23% 0.044 252);
      color: oklch(78% 0.022 248);
      font-size: 12px;
      line-height: 1.5;
    }

    .main {
      min-width: 0;
      padding: 20px 22px 42px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 14px 0 18px;
      backdrop-filter: blur(12px);
      background: color-mix(in oklch, var(--page) 88%, transparent);
    }

    .title h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .filters {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .control {
      height: 36px;
      min-width: 142px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      padding: 0 10px;
      color: var(--ink);
      outline: none;
    }
    .control:focus { border-color: var(--blue); box-shadow: 0 0 0 3px color-mix(in oklch, var(--blue-soft) 70%, transparent); }
    .search { min-width: 260px; }

    .btn {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      padding: 0 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 13px;
    }
    .btn:hover { border-color: var(--line-strong); background: oklch(97% 0.01 248); }
    .btn.primary { background: var(--blue); color: oklch(98% 0.01 248); border-color: var(--blue); }
    .btn[disabled] { opacity: .55; cursor: not-allowed; }

    .view { display: none; }
    .view.active { display: block; }
    @keyframes enter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .overview-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) 360px;
      gap: 16px;
      align-items: start;
    }

    .surface {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--r);
      box-shadow: 0 1px 0 oklch(100% 0 0 / .75);
    }

    .surface + .surface,
    .stack-gap {
      margin-top: 16px;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
    }
    .section-head h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
    }
    .section-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .summary-band {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--r);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .headline-kpis {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--r);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .overview-intent {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 10px;
    }

    .overview-intent h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
    }

    .overview-intent p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      max-width: 78ch;
    }

    .headline-kpi {
      min-height: 116px;
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 14px 10px;
      border-right: 1px solid var(--line);
      position: relative;
    }

    .headline-kpi:last-child { border-right: 0; }

    .headline-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(145deg, oklch(40% 0.13 254), oklch(55% 0.16 254));
      color: oklch(98% 0.008 248);
      box-shadow: 0 10px 22px oklch(30% 0.10 254 / .24);
    }

    .headline-icon svg {
      width: 27px;
      height: 27px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .headline-body {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .headline-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .headline-value {
      color: oklch(42% 0.16 254);
      font-size: 29px;
      line-height: .95;
      font-weight: 900;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .headline-sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.2;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .headline-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 3px;
      align-items: center;
    }

    .mini-chip {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: oklch(36% 0.11 254);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .metric {
      padding: 16px;
      min-height: 96px;
      display: grid;
      align-content: space-between;
      border-right: 1px solid var(--line);
    }
    .metric:last-child { border-right: 0; }
    .metric .label { color: var(--muted); font-size: 12px; font-weight: 700; }
    .metric .value { font-size: 28px; font-weight: 800; line-height: 1; letter-spacing: 0; }
    .metric .note { color: var(--soft); font-size: 12px; }
    .metric.red .value { color: var(--red); }
    .metric.green .value { color: var(--green); }
    .metric.yellow .value { color: oklch(50% 0.11 78); }

    .risk-list { display: grid; padding: 8px; gap: 6px; }
    .risk-row {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: oklch(98% 0.006 248);
      cursor: pointer;
      width: 100%;
      text-align: left;
    }
    .risk-row:hover { border-color: var(--line-strong); transform: translateY(-1px); }
    .rank {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--panel-2);
      font-size: 12px;
      font-weight: 800;
    }
    .risk-row h3 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
    }
    .risk-row p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 12px;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .chip.green { background: var(--green-soft); color: oklch(36% 0.11 154); border-color: oklch(82% 0.07 154); }
    .chip.yellow { background: var(--yellow-soft); color: oklch(42% 0.11 78); border-color: oklch(84% 0.09 78); }
    .chip.red { background: var(--red-soft); color: oklch(42% 0.15 27); border-color: oklch(84% 0.07 27); }
    .chip.gray { background: var(--gray-chip); color: oklch(42% 0.02 248); border-color: oklch(82% 0.012 248); }
    .chip.blue { background: var(--blue-soft); color: oklch(36% 0.11 254); border-color: oklch(82% 0.06 254); }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex: 0 0 auto;
    }

    .heatmap {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
    }
    .district-tile {
      min-height: 86px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: oklch(98% 0.007 248);
      padding: 10px;
      cursor: pointer;
      text-align: left;
    }
    .district-tile:hover { border-color: var(--blue); }
    .district-tile h3 {
      margin: 0 0 8px;
      font-size: 13px;
      line-height: 1.2;
    }
    .tile-bars {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 3px;
      margin: 8px 0;
    }
    .bar { height: 7px; border-radius: 99px; background: var(--gray-chip); }
    .bar.green { background: var(--green); }
    .bar.yellow { background: var(--yellow); }
    .bar.red { background: var(--red); }
    .district-tile p { margin: 0; color: var(--muted); font-size: 12px; }

    .side-stack { display: grid; gap: 16px; }
    .action-panel { padding: 12px; display: grid; gap: 8px; }
    .action-item {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px;
      background: oklch(98% 0.006 248);
      font-size: 13px;
    }
    .action-num {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--panel-2);
      color: var(--ink);
      font-weight: 900;
      font-size: 12px;
    }
    .action-item b { display: block; font-size: 13px; }
    .action-item span { display: block; margin-top: 2px; color: var(--muted); font-size: 12px; }
    .evidence-score { padding: 14px 16px 16px; }
    .score-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .score-line:last-child { border-bottom: 0; }
    .score-line b { font-size: 18px; }

    .timeline { padding: 8px 16px 16px; }
    .event {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .event:last-child { border-bottom: 0; }
    .event time { color: var(--muted); font-weight: 700; }
    .event p { margin: 0; line-height: 1.35; }

    .workspace {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      gap: 16px;
    }

    .district-list { padding: 8px; display: grid; gap: 6px; }
    .district-list button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: oklch(98% 0.006 248);
      padding: 10px;
      cursor: pointer;
      text-align: left;
    }
    .district-list button.active { border-color: var(--blue); background: var(--blue-soft); }
    .district-list h3 { margin: 0; font-size: 13px; }
    .district-list p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }

    .district-profile {
      display: grid;
      gap: 16px;
    }
    .profile-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) repeat(3, 150px);
      gap: 12px;
      padding: 16px;
    }
    .profile-title h2 { margin: 0 0 6px; font-size: 20px; }
    .profile-title p { margin: 0; color: var(--muted); font-size: 13px; }
    .mini {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
      background: oklch(98% 0.006 248);
    }
    .mini span { display: block; color: var(--muted); font-size: 12px; }
    .mini b { display: block; margin-top: 6px; font-size: 20px; }

    .district-kpi-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
    }

    .district-kpi {
      min-height: 92px;
      display: grid;
      align-content: space-between;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: oklch(98% 0.006 248);
      padding: 10px;
    }

    .district-kpi strong {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .district-kpi b {
      display: block;
      color: oklch(42% 0.16 254);
      font-size: 20px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .district-kpi span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .inline-note {
      margin: 0;
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      background: oklch(98% 0.006 248);
    }

    .table-wrap {
      overflow: auto;
      border-top: 1px solid var(--line);
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 900px;
      font-size: 13px;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: oklch(94% 0.012 248);
      color: oklch(38% 0.026 248);
      text-align: left;
      padding: 10px 11px;
      border-bottom: 1px solid var(--line-strong);
      font-size: 12px;
      white-space: nowrap;
    }
    td {
      padding: 10px 11px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      background: var(--panel);
    }
    tr:hover td { background: oklch(98% 0.008 248); }
    .row-action {
      border: 0;
      background: transparent;
      color: var(--blue);
      font-weight: 800;
      cursor: pointer;
      padding: 0;
    }
    .row-action:hover { text-decoration: underline; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .muted { color: var(--muted); }

    .task-board {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .lane {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--r);
      min-height: 420px;
    }
    .lane-head {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .lane-head h2 { margin: 0; font-size: 14px; }
    .tasks { padding: 8px; display: grid; gap: 8px; }
    .task {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 11px;
      background: oklch(98% 0.006 248);
      cursor: pointer;
    }
    .task h3 { margin: 0; font-size: 13px; line-height: 1.35; }
    .task p { margin: 8px 0 0; color: var(--muted); font-size: 12px; line-height: 1.35; }
    .task-foot { margin-top: 10px; display: flex; justify-content: space-between; gap: 8px; align-items: center; }

    .source-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 370px;
      gap: 16px;
      align-items: start;
    }
    .audit-list { display: grid; gap: 8px; padding: 12px; }
    .audit-item {
      display: grid;
      gap: 5px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: oklch(98% 0.006 248);
      padding: 11px;
      font-size: 13px;
    }
    .audit-item b { font-size: 13px; }
    .audit-item span { color: var(--muted); line-height: 1.35; }

    .drawer {
      position: fixed;
      inset: 0 0 0 auto;
      width: min(var(--drawer), 100vw);
      z-index: 50;
      background: var(--panel);
      border-left: 1px solid var(--line-strong);
      box-shadow: var(--shadow);
      transform: translateX(105%);
      transition: transform .22s ease-out;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .drawer-head h2 { margin: 0; font-size: 18px; line-height: 1.25; }
    .drawer-head p { margin: 5px 0 0; color: var(--muted); font-size: 13px; }
    .x {
      width: 34px;
      height: 34px;

    .form {

      gap: 10px;
    }
    .field { display: grid; gap: 5px; }
    .field label { font-size: 12px; color: var(--muted); font-weight: 800; }
    .field input, .field textarea {
      border: 1px solid var(--line);
      border-radius: 7px;

      padding: 9px 10px;

    .field input:focus, .field textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px color-mix(in oklch, var(--blue-soft) 70%, transparent); }

    .mobile-tabs {

      gap: 6px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 10px;
    }
    .mobile-tabs button {

      background: var(--panel);

      padding: 8px 11px;
      font-size: 13px;

      color: oklch(98% 0.01 248);
      font-weight: 800;
    }

    @media (prefers-reduced-motion: reduce) {

        animation-iteration-count: 1 !important;

      }
    }

    @media (max-width: 720px) {

      document.getElementById('pageTitle').textContent = titles[state.view][0];
      document.getElementById('pageSubtitle').textContent = titles[state.view][1];
      if (state.view === 'overview') renderOverview();
      if (state.view === 'districts') renderDistricts();
      if (state.view === 'monitoring') renderMonitoring();
      if (state.view === 'tasks') renderTasks();
      if (state.view === 'evidence') renderEvidence();
      if (state.view === 'sources') renderSources();
    }

    function summaryBand() {
      return `<div class="summary-band">
        <div class="metric"><div class="label">Мониторинг қаторлари</div><div class="value">402</div><div class="note">KPI ва вазифалар реестри</div></div>
        <div class="metric green"><div class="label">Тасдиқланган ижро</div><div class="value">141</div><div class="note">мақсадга етган қаторлар</div></div>
        <div class="metric red"><div class="label">Эътибор талаб</div><div class="value">9</div><div class="note">қизил ва сариқ хавфлар</div></div>
        <div class="metric yellow"><div class="label">Натижа киритилмаган</div><div class="value">252</div><div class="note">кулранг, далил/факт керак</div></div>
      </div>`;
    }

    function headlineKpis() {
      const items = [
        ['growth', 'ЯҲМ', '+7,2%', '52,1 трлн сўм', 'I ярим йиллик'],
        ['inflation', 'Инфляция', '2,9%', 'II чорак лимити', 'паст яхши'],
        ['budget', 'Бюджет', '+7,9%', '1,3 трлн сўм', 'II чорак'],
        ['rocket', 'Инвестиция', '2,1 б.р.', '1,8 млрд долл.', 'H1 режа'],
        ['export', 'Экспорт', '+21%', '361,6 млн $', 'H1 режа'],
        ['people', 'Ишсизлик', '3,8%', 'I ярим йиллик', 'паст яхши']
      ];
      return `<div class="headline-kpis" aria-label="Асосий KPI">
        ${items.map(([icon,label,value,sub,meta]) => `<div class="headline-kpi">
          <div class="headline-icon">${icons[icon]}</div>
          <div class="headline-body">
            <div class="headline-label">${label}</div>
            <div class="headline-value">${value}</div>
            <div class="headline-sub">${sub}</div>
            <div class="headline-meta"><span class="mini-chip">${meta}</span></div>
          </div>
        </div>`).join('')}
      </div>`;
    }

    function renderOverview() {
      const risks = monitoring.filter(r => ['Қизил','Сариқ'].includes(r.status));
      document.getElementById('view-overview').innerHTML = `
        <div class="overview-intent">
          <div>
            <h2>Олдин раҳбарият кўрадиган 6 та асосий мажбурият, кейин ижрога тушадиган хавфлар</h2>
            <p>Юқори қатор расмий мақсадларни кўрсатади. Қуйидаги мониторинг блоклари эса қайси туман, қайси манба ва қайси далил бўйича ҳаракат кераклигини очиб беради.</p>
          </div>
          <span class="chip blue"><span class="status-dot"></span>Андижон намунаси</span>
        </div>
        ${headlineKpis()}
        ${summaryBand()}
        <div class="overview-grid">
          <div class="surface">
            <div class="section-head">
              <div><h2>Биринчи навбатда эътибор талаб қилади</h2><p>Хавфли KPI очилганда манба, масъул ва далил ҳолати кўринади.</p></div>
              <span class="chip red">${risks.length} хавф</span>
            </div>
            <div class="risk-list">
              ${risks.map((r,i)=>riskRow(r,i+1)).join('')}
            </div>
          </div>
          <div class="side-stack">
            <div class="surface">
              <div class="section-head"><div><h2>Ишлаш тартиби</h2><p>Ҳар бир хавф қаторидан ҳаракатга ўтилади.</p></div></div>
              <div class="action-panel">
                <div class="action-item"><span class="action-num">1</span><span><b>Хавфни очиш</b><span>Қизил/сариқ KPI ёки вазифани танланг.</span></span><span class="chip red">хавф</span></div>
                <div class="action-item"><span class="action-num">2</span><span><b>Манбани текшириш</b><span>Файл, варақ ва ҳисоб қоидаси кўринади.</span></span><span class="chip blue">манба</span></div>
                <div class="action-item"><span class="action-num">3</span><span><b>Далил киритиш</b><span>Факт, изоҳ ва ҳужжат ID сақланади.</span></span><span class="chip green">далил</span></div>
              </div>
            </div>
            <div class="surface">
              <div class="section-head"><div><h2>Далиллар ҳолати</h2><p>Ҳужжатсиз қаторлар алоҳида назоратда.</p></div></div>
              <div class="evidence-score">
                <div class="score-line"><span>Қабул қилинган</span><b>5</b></div>
                <div class="score-line"><span>Кутилмоқда</span><b>2</b></div>
                <div class="score-line"><span>Далилсиз KPI</span><b>252</b></div>
              </div>
            </div>
            <div class="surface">
              <div class="section-head"><div><h2>Охирги янгиланишлар</h2><p>Импорт ва қўлда киритилган изоҳлар.</p></div></div>
              <div class="timeline">
                <div class="event"><time>23.04</time><p>Андижон кафолат хати ва 7 та Excel жадвал қабул қилинди.</p></div>
                <div class="event"><time>23.04</time><p>4.2 инвестиция жадвалида формула огоҳлантириши топилди.</p></div>
                <div class="event"><time>29.04</time><p>Дизайн прототипига хавф ва далил маркази қўшилди.</p></div>
              </div>
            </div>
          </div>
        </div>
        <div class="surface stack-gap">
          <div class="section-head">
            <div><h2>Туман/шаҳар топшириқлар ҳолати</h2><p>Плиткада ҳар бир туман бўйича бажарилмаган топшириқлар жами топшириқларга нисбатан кўрсатилади.</p></div>
          </div>
          <div class="heatmap">${districts.map(tile).join('')}</div>
        </div>`;
      bindOpeners();
    }

    function riskRow(r, rank) {
      return `<button class="risk-row" data-open="${r.id}">
        <span class="rank">${rank}</span>
        <span><h3>${esc(r.district)} · ${esc(r.indicator)}</h3><p>${esc(r.sector)} · ${esc(r.period)} · ${esc(r.source)}</p></span>
        <span class="chip ${statusClass(r.status)}">${esc(r.status)} · ${fmt(r.progress)}%</span>
      </button>`;
    }

    function tile(d) {
      return `<button class="district-tile" data-district="${esc(d.name)}">
        <h3>${esc(d.name)}</h3>
        <div class="tile-bars">
          <span class="bar green"></span><span class="bar green"></span><span class="bar ${d.yellow?'yellow':'green'}"></span><span class="bar ${d.red?'red':'gray'}"></span><span class="bar gray"></span>
        </div>
        <p>${esc(d.focus)} · бажарилмаган ${d.open}/${d.total}</p>
      </button>`;
    }

    function renderDistricts() {
      const current = districts.find(d => d.name === state.district) || districts[0];
      const rows = filteredMonitoring().filter(r => r.district === current.name || r.district === 'Андижон вилояти').slice(0,5);
      document.getElementById('view-districts').innerHTML = `<div class="workspace">
        <div class="surface">
          <div class="section-head"><div><h2>Туманлар</h2><p>Хавфи юқори туманлар юқорида.</p></div></div>
          <div class="district-list">${districts.map(d => `<button class="${d.name===current.name?'active':''}" data-district="${esc(d.name)}"><h3>${esc(d.name)}</h3><p>${esc(d.focus)} · бажарилмаган ${d.open}/${d.total}</p></button>`).join('')}</div>
        </div>
        <div class="district-profile">
          <div class="surface profile-top">
            <div class="profile-title"><h2>${esc(current.name)}</h2><p>Асосий эътибор: ${esc(current.focus)}. Аввал бажарилмаган топшириқлар ва далилсиз KPI кўрсатилади.</p></div>
            <div class="mini"><span>Жами топшириқ</span><b>${current.total}</b></div>
            <div class="mini"><span>Бажарилмаган</span><b>${current.open}</b></div>
            <div class="mini"><span>Бажарилган</span><b>${current.done}</b></div>
          </div>
          <div class="surface">
            <div class="section-head"><div><h2>Туман KPI кўрсаткичлари</h2><p>Вилоят бош саҳифасидаги асосий KPI мантиғи ҳар бир туман профилида ҳам такрорланади.</p></div></div>
            <div class="district-kpi-grid">${districtKpiCards(current.name)}</div>
          </div>
          <div class="surface">
            <div class="section-head"><div><h2>Туман бўйича очиқ масалалар</h2><p>Қаторни очинг: манба, далил ва изоҳ киритиш майдони чиқади.</p></div></div>
            ${table(rows)}
            <p class="inline-note">Якуний тизимда бу ерда шу туманга тегишли барча KPI, топшириқ ва далиллар ягона профилга боғланади.</p>
          </div>
        </div>
      </div>`;
      bindDistricts();
      bindOpeners();
    }

    function districtKpiCards(name) {
      const fallback = [
        ['Саноат', '107%+', 'H1 режа', 'green'],
        ['Инвестиция', '—', 'факт керак', 'gray'],
        ['Экспорт', '—', 'факт керак', 'gray'],
        ['Бюджет инв.', '—', 'факт керак', 'gray'],
        ['Ишсизлик', '—', 'факт керак', 'gray'],
        ['Бандлик', '—', 'факт керак', 'gray']
      ];
      return (districtKpis[name] || fallback).map(([label,value,sub,status]) => `
        <div class="district-kpi">
          <strong>${esc(label)}</strong>
          <b>${esc(value)}</b>
          <span>${esc(sub)}</span>
          <span class="chip ${statusClass(status === 'green' ? 'Яшил' : status === 'yellow' ? 'Сариқ' : status === 'red' ? 'Қизил' : 'Кулранг')}">${status === 'green' ? 'Яшил' : status === 'yellow' ? 'Сариқ' : status === 'red' ? 'Қизил' : 'Кулранг'}</span>
        </div>`).join('');
    }

    function renderMonitoring() {
      const rows = filteredMonitoring();
      document.getElementById('view-monitoring').innerHTML = `<div class="surface">
        <div class="section-head">
          <div><h2>KPI реестри</h2><p>Бу ер якуний маҳсулотда асосий иш жойи бўлади: фильтр, сортировка, таҳрир, далил.</p></div>
          <span class="chip blue">${rows.length} / 402 қатор</span>
        </div>
        ${table(rows)}
      </div>`;
      bindOpeners();
    }

    function filteredMonitoring() {
      const period = document.getElementById('periodFilter')?.value || '';
      const sector = document.getElementById('sectorFilter')?.value || '';
      const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
      return monitoring.filter(r => {
        const periodOk = !period || period === 'Барча даврлар' ? true : r.period === period;
        const sectorOk = !sector || sector === 'Барча йўналишлар' ? true : r.sector === sector;
        const text = `${r.id} ${r.district} ${r.sector} ${r.indicator} ${r.source} ${r.owner}`.toLowerCase();
        return periodOk && sectorOk && (!q || text.includes(q));
      });
    }

    function table(rows) {
      if (!rows.length) return `<p class="inline-note">Танланган фильтрлар бўйича қатор топилмади. Фильтрни ўзгартиринг ёки манба импорт ҳолатини текширинг.</p>`;
      return `<div class="table-wrap"><table>
        <thead><tr><th>ID</th><th>Туман/шаҳар</th><th>Йўналиш</th><th>Кўрсаткич</th><th>Давр</th><th>Мақсад</th><th>Амалда</th><th>%</th><th>Ҳолат</th><th>Манба</th><th></th></tr></thead>
        <tbody>${rows.map(r => `<tr>
          <td><b>${esc(r.id)}</b></td>
          <td>${esc(r.district)}</td>
          <td>${esc(r.sector)}</td>
          <td>${esc(r.indicator)}</td>
          <td>${esc(r.period)}</td>
          <td class="num">${fmt(r.target)} <span class="muted">${esc(r.unit)}</span></td>
          <td class="num">${fmt(r.actual)}</td>
          <td class="num">${fmt(r.progress)}</td>
          <td><span class="chip ${statusClass(r.status)}">${esc(r.status)}</span></td>
          <td>${esc(r.source)}</td>
          <td><button class="row-action" data-open="${r.id}">Очилсин</button></td>
        </tr>`).join('')}</tbody>
      </table></div>`;
    }

    function renderTasks() {
      const statuses = ['Қизил','Сариқ','Кулранг','Яшил'];
      document.getElementById('view-tasks').innerHTML = `<div class="task-board">
        ${statuses.map(s => `<div class="lane">
          <div class="lane-head"><h2>${s}</h2><span class="chip ${statusClass(s)}">${tasks.filter(t=>t.status===s).length}</span></div>
          <div class="tasks">${tasks.filter(t=>t.status===s).map(taskCard).join('') || `<div class="task"><p>Бу ҳолатда топшириқ йўқ.</p></div>`}</div>
        </div>`).join('')}
      </div>`;
      document.querySelectorAll('[data-task]').forEach(btn => btn.addEventListener('click', () => openTask(btn.dataset.task)));
    }

    function taskCard(t) {
      return `<button class="task" data-task="${esc(t.id)}">
        <h3>${esc(t.title)}</h3>
        <p>${esc(t.sector)} · ${esc(t.period)}<br>${esc(t.target)}</p>
        <div class="task-foot"><span class="chip ${statusClass(t.status)}">${esc(t.status)}</span><span class="muted">${esc(t.id)}</span></div>
      </button>`;
    }

    function renderEvidence() {
      document.getElementById('view-evidence').innerHTML = `<div class="surface">
        <div class="section-head"><div><h2>Далиллар журнали</h2><p>Якуний тизимда ҳар бир далил KPI ёки топшириқ ID билан боғланади.</p></div><button class="btn primary">Далил қўшиш</button></div>
        <div class="table-wrap"><table>
          <thead><tr><th>ID</th><th>Сана</th><th>Тур</th><th>Файл / изоҳ</th><th>Ҳолат</th><th>Масъул</th></tr></thead>
          <tbody>${evidence.map(e => `<tr><td><b>${e[0]}</b></td><td>${e[1] || '—'}</td><td>${e[2]}</td><td>${e[3]}</td><td><span class="chip ${e[4]==='Қабул қилинди'?'green':'yellow'}">${e[4]}</span></td><td>${e[5]}</td></tr>`).join('')}</tbody>
        </table></div>
      </div>`;
    }

    function renderSources() {
      document.getElementById('view-sources').innerHTML = `<div class="source-grid">
        <div class="surface">
          <div class="section-head"><div><h2>Андижон манба реестри</h2><p>Импорт жараёни ҳар бир файл ва варақни шу ерда текширади.</p></div></div>
          <div class="table-wrap"><table>
            <thead><tr><th>Сектор</th><th>Файл</th><th>Қамров</th><th>Тузилма</th><th>Ҳолат</th></tr></thead>
            <tbody>${sources.map(s => `<tr><td>${s[0]}</td><td><b>${s[1]}</b></td><td>${s[2]}</td><td>${s[3]}</td><td><span class="chip ${s[4]==='Топилди'?'green':'yellow'}">${s[4]}</span></td></tr>`).join('')}</tbody>
          </table></div>
        </div>
        <div class="surface">
          <div class="section-head"><div><h2>Импорт аудити</h2><p>Дизайнда бу бўлим ишонч учун алоҳида кўрсатилади.</p></div></div>
          <div class="audit-list">
            <div class="audit-item"><b>Номлаш</b><span>Марҳамат/Мархамат, Шаҳрихон/Шахрихон, Бўстон/Бустон каби вариантлар нормаллаштирилади.</span></div>
            <div class="audit-item"><b>Формула</b><span>4.2 инвестиция жадвалида захира қаторларида #DIV/0! бор, импортда алоҳида белгиланади.</span></div>
            <div class="audit-item"><b>Матн + рақам</b><span>“880 (2,1 б.)” каби ячейкалар value ва note майдонларига ажратилади.</span></div>
            <div class="audit-item"><b>Кафолат хати</b><span>110 параграфдан топшириқлар NLP/қўлда тасдиқлаш орқали task реестрига тушади.</span></div>
          </div>
        </div>
      </div>`;
    }

    function bindDistricts() {
      document.querySelectorAll('[data-district]').forEach(btn => btn.addEventListener('click', () => {
        state.district = btn.dataset.district;
        state.view = 'districts';
        render();
      }));
    }

    function bindOpeners() {
      document.querySelectorAll('[data-open]').forEach(btn => btn.addEventListener('click', () => openRow(btn.dataset.open)));
      bindDistricts();
    }

    function openRow(id) {
      const r = monitoring.find(x => x.id === id);
      if (!r) return;
      document.getElementById('drawerTitle').textContent = r.indicator;
      document.getElementById('drawerSub').textContent = `${r.district} · ${r.sector} · ${r.period}`;
      document.getElementById('drawerBody').innerHTML = `
        <div class="drawer-status">
          <span class="chip ${statusClass(r.status)}"><span class="status-dot"></span>${r.status} · ${fmt(r.progress)}%</span>
          <span class="chip blue">${esc(r.period)}</span>
        </div>
        <div class="surface drawer-card">
          <div class="detail">
            <span>ID</span><b>${esc(r.id)}</b>
            <span>Мақсад</span><b>${fmt(r.target)} ${esc(r.unit)}</b>
            <span>Амалда</span><b>${fmt(r.actual)} ${r.actual == null ? '' : esc(r.unit)}</b>
            <span>Масъул</span><b>${esc(r.owner)}</b>
            <span>Манба</span><b>${esc(r.source)}</b>
            <span>Далил</span><b>${esc(r.evidence || 'киритилмаган')}</b>
          </div>
        </div>
        <div class="surface drawer-card">
          <div class="form">
            <div class="field"><label>Амалдаги натижа</label><input type="number" value="${r.actual ?? ''}" placeholder="қиймат киритинг"></div>
            <div class="field"><label>Далил ID ёки файл номи</label><input value="${esc(r.evidence)}" placeholder="D-001"></div>
            <div class="field"><label>Изоҳ</label><textarea>${esc(r.note)}</textarea></div>
            <button class="btn primary">Сақлаш</button>
          </div>
        </div>`;
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer').setAttribute('aria-hidden', 'false');
    }

    function openTask(id) {
      const t = tasks.find(x => x.id === id);
      if (!t) return;
      document.getElementById('drawerTitle').textContent = t.title;
      document.getElementById('drawerSub').textContent = `${t.sector} · ${t.period}`;
      document.getElementById('drawerBody').innerHTML = `
        <div class="drawer-status">
          <span class="chip ${statusClass(t.status)}"><span class="status-dot"></span>${t.status}</span>
          <span class="chip blue">${esc(t.period)}</span>
        </div>
        <div class="surface drawer-card">
          <div class="detail">
            <span>ID</span><b>${esc(t.id)}</b>
            <span>Мақсад</span><b>${esc(t.target)}</b>
            <span>Масъул</span><b>${esc(t.owner)}</b>
            <span>Манба</span><b>Кафолат хати / Excel</b>
          </div>
        </div>
        <div class="surface drawer-card">
          <div class="form">
            <div class="field"><label>Ижро ҳолати</label><input placeholder="қисқа натижа"></div>
            <div class="field"><label>Далил</label><input placeholder="файл ёки ҳавола"></div>
            <div class="field"><label>Изоҳ</label><textarea placeholder="кечикиш сабаби ёки бажарилган ишлар"></textarea></div>
            <button class="btn primary">Сақлаш</button>
          </div>
        </div>`;
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer').setAttribute('aria-hidden', 'false');
    }

    document.getElementById('closeDrawer').addEventListener('click', () => {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer').setAttribute('aria-hidden', 'true');
    });
    document.getElementById('printBtn').addEventListener('click', () => window.print());
    document.getElementById('exportBtn').addEventListener('click', () => alert('Якуний тизимда жорий фильтрланган жадвал CSV/XLSX сифатида юкланади.'));
    ['periodFilter','sectorFilter','searchInput'].forEach(id => {
      document.getElementById(id).addEventListener(id === 'searchInput' ? 'input' : 'change', () => {
        if (['monitoring','districts'].includes(state.view)) render();
      });
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.getElementById('drawer').classList.remove('open');
        document.getElementById('drawer').setAttribute('aria-hidden', 'true');
      }
    });

    initNav();
    renderOverview();
  </script>
</body>
</html>
